<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Animation</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #fce4ec;
            overflow: hidden; font-family: 'Dancing Script', cursive;
            transition: background-color 2s ease;
        }

        .container { text-align: center; z-index: 10; transition: opacity 1s ease; }

        /* The Main Birthday Text */
        .Happy__Birthday {
            color: #c2185b; font-size: 5em; font-weight: 700;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8);
            margin: 0; animation: celebrate 2s ease-in-out infinite alternate;
        }

        /* The Hidden Message - Appears after blowOut */
        #secret-message {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em; color: #880e4f;
            opacity: 0; pointer-events: none;
            transition: opacity 2s ease; text-align: center; width: 80%;
        }

        /* Cake Styling */
        .cake { position: relative; width: 250px; height: 160px; margin: 0 auto 40px auto; }
        .bottom-layer, .middle-layer, .top-layer {
            position: absolute; background: #713e16; border-radius: 10px;
            left: 50%; transform: translateX(-50%); border: 2px solid #5d3412;
        }
        .bottom-layer { width: 240px; height: 60px; bottom: 0; }
        .middle-layer { width: 200px; height: 50px; bottom: 40px; background: #8d5524; }
        .top-layer { width: 160px; height: 40px; bottom: 80px; background: #f8bbd0; border-color: #f48fb1; }

        .candle {
            position: absolute; width: 12px; height: 40px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, #c2185b 5px, #c2185b 10px);
            bottom: 120px; left: 50%; transform: translateX(-50%);
            border-radius: 3px; cursor: pointer;
        }

        .flame {
            position: absolute; background: #ffee54; width: 15px; height: 25px;
            border-radius: 50% 50% 20% 20%; top: -25px; left: 50%;
            transform: translateX(-50%); box-shadow: 0 0 15px #ffeb3b;
            animation: flicker 0.1s infinite alternate;
        }

        .flame.off { display: none; }
        
        @keyframes flicker { to { transform: translateX(-50%) scale(1.1); opacity: 0.8; } }
        @keyframes celebrate { to { transform: scale(1.05); } }

        .heart-particle { position: absolute; top: -20px; font-size: 1.5rem; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <div class="cake">
            <div class="candle" onclick="blowOut()">
                <div class="flame" id="flame"></div>
            </div>
            <div class="top-layer"></div>
            <div class="middle-layer"></div>
            <div class="bottom-layer"></div>
        </div>
        <h1 class="Happy__Birthday">Happy Birthday!</h1>
        <p style="font-family: sans-serif; color: #880e4f;">Click the candle to make a wish</p>
    </div>

    <!-- The Secret Custom Message -->
    <div id="secret-message">
        You are the best!
Happy Birthday Lahari <br> 💖✨🎂
    </div>

    <div id="heart-container"></div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 2 + 3 + "s";
            heart.innerText = ['❤️', '💖', '✨'][Math.floor(Math.random() * 3)];
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        let heartInterval = setInterval(createHeart, 300);

        function blowOut() {
            // 1. Extinguish flame
            document.getElementById('flame').classList.add('off');
            
            // 2. Fade out the cake and main text
            document.getElementById('main-ui').style.opacity = '0';
            
            // 3. Darken background for a magical feel
            document.body.style.backgroundColor = '#f8bbd0';

            // 4. Show the secret message after a short delay
            setTimeout(() => {
                document.getElementById('secret-message').style.opacity = '1';
                // Double the hearts for the celebration!
                setInterval(createHeart, 100);
            }, 1000);
        }
    </script>
</body>
</html>
